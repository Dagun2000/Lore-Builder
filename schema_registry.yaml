character:
  id_prefix: char_
  fields:
    # required: name / optional: gender, birth_year, death_year, race,
    # notes, lifespan_check_ack, event_ids
    - name: name
      type: text
      required: true
    - name: gender
      type: enum
      options: [남성, 여성, 기타]
      required: false
    - name: birth_year
      type: integer
      required: false
      role: lifecycle_start
    - name: death_year
      type: integer
      required: false
      role: lifecycle_end
    - name: race
      type: reference
      ref_category: race
      required: false
    - name: notes
      type: text
      required: false
    - name: lifespan_check_ack
      type: boolean
      required: false
    - name: event_ids
      type: list
      required: false

race:
  id_prefix: race_
  fields:
    # required: name / optional: lifespan, notes, event_ids
    # weaknesses was removed (Phase 10 patch 8) — free text describing a
    # weakness belongs in notes like any other qualitative trait, and not
    # every race even has one worth calling out as its own field.
    - name: name
      type: text
      required: true
    - name: lifespan
      type: integer
      required: false
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

location:
  id_prefix: loc_
  fields:
    # required: name, category / optional: founded_year, destroyed_year,
    # notes, event_ids
    - name: name
      type: text
      required: true
    - name: category
      type: enum
      options: [kingdom, city, ruins, wilderness, dungeon, tavern]
      required: true
    - name: founded_year
      type: integer
      required: false
      role: lifecycle_start
    - name: destroyed_year
      type: integer
      required: false
      role: lifecycle_end
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

faction:
  id_prefix: faction_
  fields:
    # required: name, category / optional: founded_year, disbanded_year,
    # notes, event_ids
    - name: name
      type: text
      required: true
    - name: category
      type: enum
      options: [mercenary_guild, kingdom, religious_order, tribe]
      required: true
    - name: founded_year
      type: integer
      required: false
      role: lifecycle_start
    - name: disbanded_year
      type: integer
      required: false
      role: lifecycle_end
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

artifact:
  id_prefix: item_
  fields:
    # required: name / optional: created_year, destroyed_year, notes,
    # event_ids
    # current_status was removed (Phase 10 patch 7, D) — it was a static
    # snapshot field that directly contradicted the event-centric design
    # principle ("current state is computed from events, not stored").
    # destroyed -> destroyed_year (role: lifecycle_end, same mechanism as
    # character.death_year); lost -> a reversible duration status
    # (predicate: lost, see status_effects.yaml), cleared when the item is
    # found again; possessed/unknown are just the absence of the above,
    # computed on read via storage.get_current_state, never stored.
    # current_owner was removed too (Phase 10 patch 7 follow-up) — it was
    # kept as a deliberate "auto-refreshed cache" exception at first, but
    # that's still a stored "current" snapshot, which the user decided
    # shouldn't exist anywhere at all, cache or not. Who owns an artifact
    # right now is computed on read via storage.get_current_holder(item_id,
    # "owns"), the reverse of get_current_state — never stored, never
    # hand-edited, no cache to go stale.
    # origin_event replaced with created_year (Phase 10 patch 8) — a
    # reference to a timeline event was a different pattern from every other
    # category's created/destroyed year pair; created_year (role:
    # lifecycle_start) makes artifact match character/location/faction.
    - name: name
      type: text
      required: true
    - name: created_year
      type: integer
      required: false
      role: lifecycle_start
    - name: destroyed_year
      type: integer
      required: false
      role: lifecycle_end
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

timeline:
  id_prefix: event_
  fields:
    # required: none (schema-level) — a point record needs year, a duration
    # record needs entity/predicate/start_year; enforced by archivist, not
    # here / optional: notes, year, location, entity, predicate, target,
    # start_year, end_year
    # Common to both event shapes.
    - name: notes
      type: text
      required: false
    # Point-event fields — a moment-in-time occurrence, no ongoing state.
    - name: year
      type: integer
      required: false
      role: timeline_point
    - name: location
      type: reference
      ref_category: location
      required: false
    # Duration-event fields — an ongoing relationship or personal status,
    # represented as one record with a start and (optionally) an end,
    # instead of a separate `relationship` row + a snapshot field on the
    # entity. `predicate` is a status_effects.yaml id for a personal state
    # (target left empty) or free text for a relationship (target filled).
    - name: entity
      type: reference
      ref_category: any
      required: false
    - name: predicate
      type: text
      required: false
    - name: target
      type: reference
      ref_category: any
      required: false
    - name: start_year
      type: integer
      required: false
      role: lifecycle_start
    - name: end_year
      type: integer
      required: false
      role: lifecycle_end

system:
  id_prefix: system_
  fields:
    # required: name, domain, hard_rule / optional: notes
    # name added (Phase 10 patch 8) — domain/hard_rule alone gave no way for
    # a person to identify/refer to a specific rule; every other category
    # already had a name field.
    - name: name
      type: text
      required: true
    - name: domain
      type: enum
      options: [magic, divine, artifact_law, physics]
      required: true
    - name: hard_rule
      type: boolean
      required: true
    - name: notes
      type: text
      required: false
