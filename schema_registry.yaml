character:
  id_prefix: char_
  fields:
    # required: name / optional: gender, birth_year, death_year, race,
    # appearance, notes, lifespan_check_ack, event_ids
    - name: name
      type: text
      required: true
    - name: gender
      type: enum
      options: [남성, 여성, 기타]
      required: false
    - name: birth_year
      type: integer
      required: false
      role: lifecycle_start
    - name: death_year
      type: integer
      required: false
      role: lifecycle_end
    - name: race
      type: reference
      ref_category: race
      required: false
    - name: appearance
      type: text
      required: false
    - name: notes
      type: text
      required: false
    - name: lifespan_check_ack
      type: boolean
      required: false
    - name: event_ids
      type: list
      required: false

race:
  id_prefix: race_
  fields:
    # required: name / optional: lifespan, weaknesses, notes, event_ids
    - name: name
      type: text
      required: true
    - name: lifespan
      type: integer
      required: false
    - name: weaknesses
      type: list
      required: false
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

location:
  id_prefix: loc_
  fields:
    # required: name, category / optional: founded_year, destroyed_year,
    # notes, event_ids
    - name: name
      type: text
      required: true
    - name: category
      type: enum
      options: [kingdom, city, ruins, wilderness, dungeon, tavern]
      required: true
    - name: founded_year
      type: integer
      required: false
      role: lifecycle_start
    - name: destroyed_year
      type: integer
      required: false
      role: lifecycle_end
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

faction:
  id_prefix: faction_
  fields:
    # required: name, category / optional: founded_year, disbanded_year,
    # notes, event_ids
    - name: name
      type: text
      required: true
    - name: category
      type: enum
      options: [mercenary_guild, kingdom, religious_order, tribe]
      required: true
    - name: founded_year
      type: integer
      required: false
      role: lifecycle_start
    - name: disbanded_year
      type: integer
      required: false
      role: lifecycle_end
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

artifact:
  id_prefix: item_
  fields:
    # required: name, current_status / optional: current_owner,
    # origin_event, destroyed_year, notes, event_ids
    - name: name
      type: text
      required: true
    # Cached, not authoritative — always re-derived from the latest
    # predicate:"owns" duration event touching this artifact at save time
    # (see archivist.build_diff), never hand-edited independently of that.
    - name: current_owner
      type: reference
      ref_category: character
      required: false
      role: ownership
    - name: current_status
      type: enum
      options: [possessed, lost, destroyed, unknown]
      required: true
    - name: origin_event
      type: reference
      ref_category: timeline
      required: false
    - name: destroyed_year
      type: integer
      required: false
      role: lifecycle_end
    - name: notes
      type: text
      required: false
    - name: event_ids
      type: list
      required: false

timeline:
  id_prefix: event_
  fields:
    # required: none (schema-level) — a point record needs year, a duration
    # record needs entity/predicate/start_year; enforced by archivist, not
    # here / optional: notes, year, location, entity, predicate, target,
    # start_year, end_year
    # Common to both event shapes.
    - name: notes
      type: text
      required: false
    # Point-event fields — a moment-in-time occurrence, no ongoing state.
    - name: year
      type: integer
      required: false
      role: timeline_point
    - name: location
      type: reference
      ref_category: location
      required: false
    # Duration-event fields — an ongoing relationship or personal status,
    # represented as one record with a start and (optionally) an end,
    # instead of a separate `relationship` row + a snapshot field on the
    # entity. `predicate` is a status_effects.yaml id for a personal state
    # (target left empty) or free text for a relationship (target filled).
    - name: entity
      type: reference
      ref_category: any
      required: false
    - name: predicate
      type: text
      required: false
    - name: target
      type: reference
      ref_category: any
      required: false
    - name: start_year
      type: integer
      required: false
      role: lifecycle_start
    - name: end_year
      type: integer
      required: false
      role: lifecycle_end

system:
  id_prefix: system_
  fields:
    # required: domain, hard_rule / optional: notes
    - name: domain
      type: enum
      options: [magic, divine, artifact_law, physics]
      required: true
    - name: hard_rule
      type: boolean
      required: true
    - name: notes
      type: text
      required: false
